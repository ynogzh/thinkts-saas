# Hardening config consumed by pnpm >=10.26.
# DO NOT add packages to allowBuilds without a matching code-review approval -
# every entry here is a standing privilege that becomes a vector if the
# package is later compromised.
packages:
  - "."

allowBuilds: []
strictDepBuilds: true

# Block install of versions newer than 3 days (4320 minutes).
# Would have prevented Axios (live ~3 hours), qix, Payblocks.
minimumReleaseAge: 4320

# Treat provenance regressions as a supply-chain signal.
trustPolicy: no-downgrade
trustPolicyExclude:
  - "reselect@5.1.1"

# Do not re-enable blockExoticSubdeps here. When minimumReleaseAge or
# trustPolicy filters an exact-pinned registry version, pnpm can report the
# candidate as unresolved and false-flag it as exotic. Exotic transitive specs
# are covered by CODEOWNERS review on pnpm-lock.yaml plus CI frozen-lockfile
# installs, where git/http/file/workspace swaps are visible in the lock diff.
